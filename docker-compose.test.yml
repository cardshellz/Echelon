version: '3.8'

services:
  test-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: testpassword
      POSTGRES_DB: echelon_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d echelon_test"]
      interval: 5s
      timeout: 5s
      retries: 5
    command: postgres -c log_statement=none -c log_min_messages=WARNING
