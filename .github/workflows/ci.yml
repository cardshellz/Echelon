name: CI

# Runs on every PR and on pushes to main. Enable branch protection in
# GitHub repo settings → Branches → require "Typecheck + unit tests"
# status check to pass before merge.
#
# The PostgreSQL hardening job covers self-contained financial-command and
# PO-email-outbox guarantees plus the disposable named-schema channel/inventory
# harness.

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-and-unit:
    name: Typecheck + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck (tsc)
        run: npm run check
      - name: Unit tests
        run: npm run test:unit

  postgres-hardening:
    name: PostgreSQL hardening tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: echelon_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d echelon_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      ECHELON_TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/echelon_test
      ECHELON_TEST_DATABASE_DISPOSABLE: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Financial command PostgreSQL guarantees
        run: >-
          npx vitest run
          server/platform/__tests__/integration/financial-command-results.integration.test.ts
      - name: PO email outbox PostgreSQL guarantees
        run: >-
          npx vitest run
          server/modules/procurement/__tests__/integration/po-email-outbox.integration.test.ts
      - name: Historical PO supplier evidence PostgreSQL guarantees
        run: >-
          npx vitest run
          server/modules/procurement/__tests__/integration/historical-po-supplier-evidence-backfill.integration.test.ts
      - name: Legacy PO receive configuration PostgreSQL guarantees
        run: >-
          npx vitest run
          server/modules/procurement/__tests__/integration/legacy-po-receive-config-remediation.integration.test.ts
      - name: Named-schema channel and inventory guarantees
        run: >-
          npx vitest run --no-file-parallelism
          server/modules/channels/__tests__/integration/allocation-engine.integration.test.ts
          server/modules/channels/__tests__/integration/source-lock.integration.test.ts
          server/modules/inventory/__tests__/integration/allocation-concurrency.integration.test.ts
