name: CI

# Runs on every PR and on pushes to main. Enable branch protection in
# GitHub repo settings → Branches → require "Typecheck + unit tests"
# status check to pass before merge.
#
# Integration tests are NOT included here. They need a fully-bootstrapped
# Postgres with all named schemas (channels, catalog, warehouse, inventory,
# oms, wms, etc.) and 168+ migration files applied. Run them locally against
# the dev database: ECHELON_TEST_DATABASE_URL=... npm run test:integration

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-and-unit:
    name: Typecheck + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck (tsc)
        run: npm run check
      - name: Unit tests
        run: npm run test:unit
